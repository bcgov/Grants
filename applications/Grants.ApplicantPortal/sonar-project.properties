# SonarCloud configuration for Grants Applicant Portal
sonar.projectKey=bcgov_Grants
sonar.organization=bcgov-sonarcloud
sonar.host.url=https://sonarcloud.io

# Project metadata
sonar.projectName=Grants
sonar.projectDescription=Grant application portal for the Province of British Columbia

# Source code settings
sonar.sources=src
sonar.tests=tests

# Build settings - allow analysis without compilation
sonar.dotnet.excludeGeneratedCode=true

# Quality gate settings
sonar.qualitygate.wait=true

# SonarCloud Exclusions
sonar.exclusions=src/Grants.ApplicantPortal.Backend/src/Grants.ApplicantPortal.API.Infrastructure/Data/Migrations/**,**/bin/**,**/obj/**,**/node_modules/**,**/dist/**,**/wwwroot/**,**/public/**,**/*.Designer.cs,**/*.generated.ts,**/package-lock.json

# Test exclusions
sonar.test.exclusions=**/bin/**,**/obj/**,**/node_modules/**,**/coverage/**

# Coverage analysis explicitly disabled (excludes all files from coverage)
sonar.coverage.exclusions=**/*

# Code duplication exclusions
sonar.cpd.exclusions=**/*.html,**/*.cshtml,**/*.css,**/*.scss,**/*.generated.ts,**/*.Designer.cs,**/*

# Language-specific configurations
sonar.typescript.node.maxspace=8192
sonar.javascript.node.maxspace=8192

# SCM settings
sonar.scm.provider=git

# .NET specific settings
sonar.cs.analyzer.projectOutPaths=**/bin/**,**/obj/**
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml
sonar.cs.vstest.reportsPaths=**/TestResults/*.trx