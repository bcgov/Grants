<div class="applicant-info-content">
  <div class="app-info">
    @if (hasMultipleOrgs) {
      <span class="app-warning">
        <i class="fas fa-exclamation-triangle me-1"></i>
        Multiple organization records found — please contact support to consolidate.
      </span>
    } @else if (orgNumber || orgName) {
      <span id="applicant-id" class="app-id">{{ orgNumber }}</span>
      <span id="applicant-name" class="app-name">{{ orgName }}</span>
    }
  </div>

  <div class="content-grid">
    <app-organization-info
      id="card-organization"
      [pluginId]="pluginId"
      [provider]="provider"
      (organizationLoaded)="onOrganizationLoaded($event)"
      (multipleOrganizationsDetected)="onMultipleOrganizationsDetected($event)"
    ></app-organization-info>

    <app-applicant-info-submissions
      id="card-submissions"
      [pluginId]="pluginId"
      [provider]="provider"
    ></app-applicant-info-submissions>

    <app-contacts
      id="card-contacts"
      [pluginId]="pluginId"
      [provider]="provider"
    ></app-contacts>

    <app-addresses
      id="card-addresses"
      [pluginId]="pluginId"
      [provider]="provider"
    ></app-addresses>
  </div>
</div>
