<div class="applicant-info-content">
  <div class="app-info">
    <span id="applicant-id" class="app-id">{{ applicantInfo?.id }}</span>
    <span id="applicant-name" class="app-name">{{ applicantInfo?.organization }}</span>
  </div>

  <div class="content-grid">
    <app-organization-info
      id="card-organization"
      [pluginId]="pluginId"
      [provider]="provider"
    ></app-organization-info>

    <app-applicant-info-submissions
      id="card-submissions"
      [pluginId]="pluginId"
      [provider]="provider"
    ></app-applicant-info-submissions>

    <app-contacts
      id="card-contacts"
      [pluginId]="pluginId"
      [provider]="provider"
    ></app-contacts>

    <app-addresses
      id="card-addresses"
      [pluginId]="pluginId"
      [provider]="provider"
    ></app-addresses>
  </div>
</div>
