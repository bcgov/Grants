<div class="applicant-info-content">
  <div class="app-info">
    <span class="app-id">{{ applicantInfo?.id }}</span>
    <span class="app-name">{{ applicantInfo?.organization }}</span>
  </div>

  <div class="content-grid">
    <div class="card">
      <div class="card-header d-flex align-items-center justify-content-between">
        <div>
          <h3 class="mb-0 ap-pad-10">Organization Information</h3>
        </div>
        <div>
          <button
            *ngIf="!organizationComponent.isEditMode"
            type="button"
            class="btn btn-primary btn-sm"
            (click)="organizationComponent.onEdit()"
          >
            Edit
          </button>
          <div *ngIf="organizationComponent.isEditMode" class="btn-group">
            <button
              type="button"
              class="btn btn-primary btn-sm"
              (click)="organizationComponent.onSave()"
            >
              Save
            </button>
            <button
              type="button"
              class="btn btn-secondary btn-sm"
              (click)="organizationComponent.onCancel()"
            >
              Cancel
            </button>
          </div>
        </div>
      </div>
      <div class="card-body">
        <app-organization-info
          #organizationComponent
          [organizationInfo]="organizationInfo"
          [isLoading]="isLoading"
          (saveOrganization)="onSaveOrganization()"
          (searchResultSelected)="onSearchResultSelected($event)"
        ></app-organization-info>
      </div>
    </div>

    <div class="card">
      <div class="card-header d-flex align-items-center">
        <div>
          <h3 class="mb-0 ap-pad-10">Submissions</h3>
        </div>
      </div>
      <div class="card-body">
        <app-applicant-info-submissions
          [profileId]="profileId"
          [pluginId]="pluginId"
          [provider]="provider"
        ></app-applicant-info-submissions>
      </div>
    </div>
  </div>

  <div class="content-grid">
    <div class="card">
      <div class="card-header d-flex align-items-center justify-content-between">
        <div>
          <h3 class="mb-0 ap-pad-10">Contact Information</h3>
        </div>
        <div>
          <button
            type="button"
            class="btn btn-primary btn-sm"
            (click)="contactsComponent.onAddContact()"
          >
            Add
          </button>
        </div>
      </div>
      <div class="card-body">
        <app-contacts
          #contactsComponent
          [profileId]="profileId"
          [pluginId]="pluginId"
          [provider]="provider"
        ></app-contacts>
      </div>
    </div>

    <div class="card">
      <div class="card-header d-flex align-items-center">
        <div>
          <h3 class="mb-0 ap-pad-10">Address Information</h3>
        </div>
      </div>
      <div class="card-body">
        <app-addresses
          [profileId]="profileId"
          [pluginId]="pluginId"
          [provider]="provider"
        ></app-addresses>
      </div>
    </div>
  </div>
</div>
