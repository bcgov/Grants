<div class="card">
  <div class="card-header d-flex align-items-center">
    <div>
      <h3 class="mb-0 ap-pad-10">Submissions</h3>
    </div>
  </div>
  <div class="card-body">
    <app-datatable
      idSuffix="submissions"
      [config]="submissionsTableConfig"
      [data]="submissionsData || []"
      [loading]="isLoading"
      (rowClick)="onSubmissionRowClick($event)"
      (actionClick)="onSubmissionAction($event)"
      (sort)="onSubmissionSort($event)"
    ></app-datatable>
  </div>
</div>
