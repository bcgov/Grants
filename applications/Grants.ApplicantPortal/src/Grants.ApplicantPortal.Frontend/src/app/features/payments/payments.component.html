<div class="page-content">
  <app-org-header
    [orgNumber]="orgNumber"
    [orgName]="orgName"
    [hasMultipleOrgs]="hasMultipleOrgs"
  ></app-org-header>

  <div class="card">
    <div class="card-header d-flex align-items-center">
      <div>
        <h3 class="mb-0 ap-pad-10">Payments</h3>
      </div>
    </div>
    <div class="card-body">
      <app-datatable
        [config]="paymentsTableConfig"
        [data]="paymentsData"
        [loading]="isLoading"
        (sort)="onPaymentSort($event)"
      ></app-datatable>
    </div>
  </div>
</div>
