<div class="dropdown" [ngClass]="dropdownClass">
  <button
    [ngClass]="buttonClass"
    type="button"
    [id]="dropdownId"
    [attr.data-cy]="dropdownId"
    [attr.aria-label]="ariaLabel"
    data-bs-toggle="dropdown"
    aria-expanded="false"
  >
    <img *ngIf="iconSrc" [src]="iconSrc" alt="" class="profile-icon" aria-hidden="true" />
    <i *ngIf="!iconSrc" [ngClass]="iconClass" aria-hidden="true"></i>
  </button>
  <ul
    class="dropdown-menu"
    [ngClass]="menuClass"
    [attr.aria-labelledby]="dropdownId"
  >
    <li *ngIf="showLogout">
      <a class="dropdown-item" [attr.id]="dropdownId + '-logout'" [attr.data-cy]="dropdownId + '-logout'" href="#" (click)="onLogout($event)">Log out</a>
    </li>
  </ul>
</div>
