<div class="container-fluid p-0">
  <div class="row g-0 min-vh-100">
    <!-- Mobile Header with Hamburger -->
    <div class="mobile-header d-lg-none">
      <div class="mobile-header-content">
        <button
          id="mobile-hamburger-btn"
          data-cy="mobile-hamburger-btn"
          class="hamburger-btn"
          (click)="toggleSidebar()"
          [class.active]="sidebarOpen"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="mobile-brand">
          <div class="mobile-logo">
            <img
              src="images/logo/BCID_V_rgb_rev.png"
              alt="BC Government Logo"
              class="mobile-bc-logo"
            />
          </div>
          <div class="mobile-title">
            <div class="mobile-main-title">Enterprise Grant</div>
            <div class="mobile-sub-title">Management System</div>
          </div>
        </div>

        <app-user-dropdown
          [userInfo]="applicantInfo"
          dropdownId="mobile-user-dropdown"
          buttonClass="btn btn-outline-light dropdown-toggle"
          dropdownClass="mobile-dropdown"
          iconSrc="images/icons/gg_profile.svg"
          (logoutEvent)="onMobileLogout($event)"
        >
        </app-user-dropdown>
      </div>
    </div>

    <!-- Sidebar Overlay for Mobile -->
    <div
      class="sidebar-overlay"
      [class.show]="sidebarOpen"
      (click)="closeSidebar()"
      *ngIf="sidebarOpen"
    ></div>

    <!-- Sidebar Column -->
    <div
      class="sidebar-column"
      [class.sidebar-collapsed]="sidebarCollapsed"
      [class.mobile-open]="sidebarOpen"
      [class.d-none]="!sidebarOpen"
      [class.d-lg-block]="true"
    >
      <div class="sidebar-container">
        <!-- Close button for mobile -->
        <button id="mobile-close-btn" data-cy="mobile-close-btn" class="mobile-close-btn d-lg-none" (click)="closeSidebar()">
          <i class="fa-solid fa-times"></i>
        </button>
        <app-sidebar [collapsed]="sidebarCollapsed" (collapsedChange)="sidebarCollapsed = $event" (menuItemClicked)="closeSidebar()"></app-sidebar>
      </div>
    </div>

    <!-- Main Content Column -->
    <div class="main-content-column" [class.sidebar-collapsed]="sidebarCollapsed">
      <div class="main-content-container">
        <!-- Header Section -->
        <header class="main-header">
          <app-header [applicantInfo]="applicantInfo"></app-header>
        </header>

        <!-- Page Content Section -->
        <main class="page-content">
          <router-outlet></router-outlet>
        </main>
      </div>
    </div>
  </div>
</div>
