<div class="logo-section">
  <div class="sidebar-logo">
    <img
      src="images/logo/BCID_V_rgb_rev.png"
      alt="BC Government Logo"
      class="bc-logo"
    />
  </div>
  <div class="system-title">
    <div class="main-title">Enterprise Grant</div>
    <div class="sub-title">Management System</div>
  </div>
</div>
<aside>
  <nav class="nav-menu">
    <a
      id="nav-applicant-info"
      data-cy="nav-applicant-info"
      routerLink="/app/applicant-info"
      routerLinkActive="active"
      class="nav-item"
      [attr.title]="collapsed ? 'Applicant Info' : null"
      (click)="onMenuItemClick()"
    >
      <img src="images/icons/proicons_document.svg" alt="" class="nav-icon" />
      <span class="nav-label">Applicant Info</span>
    </a>
    <a
      id="nav-payments"
      data-cy="nav-payments"
      routerLink="/app/payments"
      routerLinkActive="active"
      class="nav-item"
      [attr.title]="collapsed ? 'Payments' : null"
      (click)="onMenuItemClick()"
    >
      <img src="images/icons/fluent_payment-32-regular.svg" alt="" class="nav-icon" />
      <span class="nav-label">Payments</span>
    </a>
  </nav>
  <a class="funding-info" href="https://www2.gov.bc.ca/gov/content/employment-business/economic-development/funding-and-grants" target="_blank" rel="noopener noreferrer"
    [attr.title]="collapsed ? 'Economic Development funding & grants' : null">
    <img src="images/icons/material-symbols_info-outline.svg" alt="" class="info-icon" />
    <div class="nav-label">
      <div>Economic Development</div>
      <div>funding & grants</div>
    </div>
  </a>
  <div class="sidebar-footer">
    <div class="version">
      <span class="nav-label">v1.0</span>
      <button type="button" class="collapse-btn d-none d-lg-flex" (click)="toggleCollapse()" [attr.aria-label]="collapsed ? 'Expand sidebar' : 'Collapse sidebar'">
        <img src="images/icons/uiw_d-arrow-left.svg" alt="" class="collapse-arrow" [class.rotated]="collapsed" />
      </button>
    </div>
  </div>
</aside>
