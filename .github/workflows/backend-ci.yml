name: Backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - "applications/Grants.ApplicantPortal/src/Grants.ApplicantPortal.Backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: applications/Grants.ApplicantPortal/src/Grants.ApplicantPortal.Backend

jobs:
  build-and-test:
    name: Build & Test (.NET)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: grants_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: >
          dotnet test tests/Grants.ApplicantPortal.API.UnitTests
          --no-build
          --configuration Release
          --logger "console;verbosity=normal"

      - name: Run integration tests
        env:
          ConnectionStrings__DefaultConnection: >-
            Host=localhost;Port=5432;Database=grants_test;Username=postgres;Password=postgres
          ConnectionStrings__Redis: "localhost:6379"
        run: >
          dotnet test tests/Grants.ApplicantPortal.API.IntegrationTests
          --no-build
          --configuration Release
          --logger "console;verbosity=normal"
