name: Frontend CI

on:
  pull_request:
    branches: [main]
    paths:
      - "applications/Grants.ApplicantPortal/src/Grants.ApplicantPortal.Frontend/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: applications/Grants.ApplicantPortal/src/Grants.ApplicantPortal.Frontend

jobs:
  build-and-test:
    name: Build & Test (Angular)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: applications/Grants.ApplicantPortal/src/Grants.ApplicantPortal.Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --no-progress --watch=false --browsers=ChromeHeadless

      - name: Build (production)
        run: npm run build
